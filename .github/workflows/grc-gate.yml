name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assurance:
    name: policy-oscal-evidence
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.8"

      - name: Validate Terraform
        run: |
          set -euo pipefail
          for directory in terraform native-monitoring immutable-vault; do
            echo "Validating ${directory}"
            terraform -chdir="$directory" fmt -check -diff
            terraform -chdir="$directory" init -backend=false -input=false
            terraform -chdir="$directory" validate
          done

      - name: Install Conftest
        env:
          CONFTEST_VERSION: "0.68.2"
        run: |
          set -euo pipefail
          asset="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          base="https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}"
          curl -fsSL -o conftest.tar.gz "${base}/${asset}"
          curl -fsSL -o checksums.txt "${base}/checksums.txt"
          expected_sha="$(awk -v file="$asset" '$2 == file {print $1}' checksums.txt)"
          test -n "$expected_sha"
          echo "${expected_sha}  conftest.tar.gz" | sha256sum -c -
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Install OPA
        env:
          OPA_VERSION: "1.18.2"
        run: |
          set -euo pipefail
          base="https://github.com/open-policy-agent/opa/releases/download/v${OPA_VERSION}"
          curl -fsSL -o opa "${base}/opa_linux_amd64_static"
          curl -fsSL -o opa.sha256 "${base}/opa_linux_amd64_static.sha256"
          sed 's#  opa_linux_amd64_static$#  opa#' opa.sha256 | sha256sum -c -
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Test policy and Terraform plan
        run: |
          set -euo pipefail
          opa test policies -v
          for namespace in compliance.sc28_aws compliance.ac3_aws compliance.au3_aws compliance.cm6_aws; do
            conftest test evidence/policy-tests/terraform-plan.json --policy policies --namespace "$namespace"
          done

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Trestle
        run: pip install compliance-trestle==4.2.0

      - name: Validate OSCAL
        working-directory: oscal
        run: |
          set -euo pipefail
          trestle validate -f component-definitions/grc-engineering-pipeline/component-definition.json
          trestle validate -f profiles/grc-engineering-pipeline/profile.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Traverse OSCAL and verify signed evidence
        run: |
          set -euo pipefail
          href="$(jq -r '.["component-definition"].components[]."control-implementations"[]."implemented-requirements"[] | select(."control-id" == "sc-28") | .links[] | select(.rel == "evidence") | .href' oscal/component-definitions/grc-engineering-pipeline/component-definition.json)"
          evidence_path="$(realpath -m "oscal/component-definitions/grc-engineering-pipeline/${href}")"
          test "$evidence_path" = "$(realpath evidence/signed-bundle/evidence.tar.gz)"
          ./scripts/verify-evidence.sh "$evidence_path"
